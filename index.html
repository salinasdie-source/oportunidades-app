<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Base de Oportunidades</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#f0f4f8;font-family:'DM Sans',sans-serif}
    .app{max-width:680px;margin:0 auto;min-height:100vh}
    .hdr-bar{background:#fff;padding:14px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #e2e8f0;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.06)}
    .hdr-bar.main{justify-content:space-between}
    .hdr-title{font-weight:600;font-size:16px;flex:1}
    .brand{display:flex;align-items:center;gap:8px}
    .brand-icon{color:#2563eb;font-size:18px}
    .brand-name{font-weight:700;font-size:18px;color:#1e293b;letter-spacing:-.3px}
    .search-bar{padding:16px 16px 8px;display:flex;gap:8px}
    .search-in{flex:1;padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-family:inherit;font-size:14px;background:#fff;outline:none;transition:border .2s}
    .search-in:focus{border-color:#2563eb}
    .filter-sel{padding:10px 12px;border:1.5px solid #e2e8f0;border-radius:10px;font-family:inherit;font-size:13px;background:#fff;outline:none;cursor:pointer;max-width:160px}
    .chips-row{display:flex;gap:6px;padding:0 16px 12px;flex-wrap:wrap}
    .chip{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;font-size:12px;font-family:inherit;border:1.5px solid #e2e8f0;background:#fff;cursor:pointer;transition:all .15s;color:#64748b}
    .chip.sel{font-weight:600}
    .chip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
    .list{padding:0 16px;display:flex;flex-direction:column;gap:10px}
    .card{background:#fff;border-radius:14px;padding:16px;display:flex;gap:12px;align-items:flex-start;border:1.5px solid #e8edf2;cursor:pointer;transition:all .15s;box-shadow:0 1px 3px rgba(0,0,0,.04)}
    .card:hover{border-color:#2563eb33;box-shadow:0 4px 12px rgba(37,99,235,.1);transform:translateY(-1px)}
    .card-main{flex:1;min-width:0}
    .card-nombre{font-weight:600;font-size:14.5px;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .card-sub{font-size:12px;color:#64748b;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .tags{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
    .tag{font-size:11px;padding:2px 8px;border-radius:6px;background:#eff6ff;color:#2563eb;font-weight:500}
    .tag.ghost{background:#f1f5f9;color:#64748b}
    .card-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
    .card-usd{font-family:'DM Mono',monospace;font-size:12px;font-weight:500;color:#059669;white-space:nowrap}
    .ebadge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap}
    .ebadge.sm{font-size:11px;padding:3px 8px}
    .edot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
    .detail-wrap{padding:16px}
    .detail-hero{background:linear-gradient(135deg,#1e3a5f,#2563eb);border-radius:14px;padding:24px;color:#fff;margin-bottom:16px}
    .d-nombre{font-size:20px;font-weight:700;line-height:1.2}
    .d-sub{font-size:13px;opacity:.75;margin-top:4px}
    .detail-hero .ebadge{margin-top:12px}
    .estado-box{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;border:1.5px solid #e8edf2}
    .sec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#94a3b8;margin-bottom:10px}
    .estado-btns{display:flex;gap:7px;flex-wrap:wrap}
    .ebtn{padding:7px 14px;border-radius:8px;font-family:inherit;font-size:13px;font-weight:500;border:1.5px solid #e2e8f0;background:#f8fafc;cursor:pointer;transition:all .15s;color:#475569}
    .ebtn.active{font-weight:700}
    .detail-grid{background:#fff;border-radius:14px;border:1.5px solid #e8edf2;overflow:hidden;margin-bottom:16px}
    .drow{display:flex;padding:11px 16px;border-bottom:1px solid #f1f5f9}
    .drow:last-child{border-bottom:none}
    .dlabel{font-size:12px;color:#64748b;font-weight:600;width:42%;flex-shrink:0}
    .dval{font-size:13px;color:#1e293b}
    .form-wrap{padding:16px;display:flex;flex-direction:column;gap:12px}
    .fgroup{background:#fff;border-radius:12px;padding:14px 16px;border:1.5px solid #e8edf2}
    .flabel{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:#94a3b8;margin-bottom:7px}
    .fi{width:100%;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-family:inherit;font-size:14px;background:#f8fafc;outline:none;transition:border .2s;color:#1e293b}
    .fi:focus{border-color:#2563eb;background:#fff}
    .form-actions{padding:8px 0 24px}
    .err-box{background:#fee2e2;color:#991b1b;padding:12px 16px;border-radius:10px;font-size:13px;font-weight:500}
    .btn-primary{background:#2563eb;color:#fff;border:none;border-radius:10px;padding:11px 20px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s}
    .btn-primary:hover{background:#1d4ed8}
    .btn-primary:disabled{background:#93c5fd}
    .btn-primary.compact{padding:8px 16px;font-size:13px}
    .btn-primary.full{width:100%;padding:14px}
    .btn-back{background:none;border:none;font-family:inherit;font-size:14px;color:#2563eb;cursor:pointer;font-weight:600;padding:0}
    .btn-ghost{background:#f1f5f9;border:1.5px solid #e2e8f0;border-radius:7px;padding:6px 10px;cursor:pointer;font-size:13px}
    .btn-icon{background:#f1f5f9;border:1.5px solid #e2e8f0;border-radius:8px;padding:7px 11px;cursor:pointer;font-size:13px;font-family:inherit;font-weight:500}
    .btn-icon.sm{padding:5px 9px;font-size:12px}
    .btn-icon.danger{background:#fff1f2;border-color:#fecdd3;color:#e11d48}
    .empty{text-align:center;color:#94a3b8;padding:60px 20px;font-size:15px;display:flex;flex-direction:column;align-items:center}
    .spinner{width:32px;height:32px;border:3px solid #e2e8f0;border-top-color:#2563eb;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .footer{text-align:center;color:#cbd5e1;font-size:11px;padding:16px}
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 22px;border-radius:10px;font-size:13px;font-weight:500;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.2);animation:fadeup .2s ease;white-space:nowrap}
    .toast.warn{background:#b45309}
    .toast.err{background:#dc2626}
    @keyframes fadeup{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
  </style>
</head>

// JSONP — funciona sin restricciones CORS desde cualquier página
function jsonp(params) {
  return new Promise((resolve, reject) => {
    const cb = "cb_" + Date.now() + "_" + Math.floor(Math.random()*99999);
    const timer = setTimeout(() => {
      delete window[cb];
      document.getElementById(cb)?.remove();
      reject(new Error("Timeout - verificá tu conexión"));
    }, 20000);

    window[cb] = (data) => {
      clearTimeout(timer);
      delete window[cb];
      document.getElementById(cb)?.remove();
      if (data && data.error) reject(new Error(data.error));
      else resolve(data);
    };

    const qs = Object.entries({ ...params, callback: cb })
      .map(([k,v]) => encodeURIComponent(k) + "=" + encodeURIComponent(String(v)))
      .join("&");

    const s = document.createElement("script");
    s.id = cb;
    s.src = SCRIPT_URL + "?" + qs;
    s.onerror = () => {
      clearTimeout(timer);
      delete window[cb];
      s.remove();
      reject(new Error("No se pudo conectar con Google Sheets"));
    };
    document.head.appendChild(s);
  });
}

function CampoSelect({ campo, value, onChange }) {
  const opts = OPCIONES[campo] || null;

  // Sin opciones: input libre
  if (!opts) return (
    <input className="fi" value={value}
      onChange={e=>onChange(e.target.value)}
      placeholder={"Ingresar "+campo}/>
  );

  // Lista pequeña (<= 20): select nativo
  if (opts.length <= 20) return (
    <select className="fi" value={value} onChange={e=>onChange(e.target.value)}>
      <option value="">— Seleccionar —</option>
      {opts.map(o=><option key={o} value={o}>{o}</option>)}
      <option value="__nuevo__">➕ Escribir nuevo...</option>
    </select>
  );

  // Lista grande: input + datalist (nativo del browser, funciona en todos los dispositivos)
  const listId = "dl-"+campo.replace(/\s/g,"_");
  return (
    <div>
      <input className="fi" value={value}
        onChange={e=>onChange(e.target.value)}
        list={listId}
        placeholder={"Buscar o escribir "+campo+"..."}
        autoComplete="off"
      />
      <datalist id={listId}>
        {opts.map(o=><option key={o} value={o}/>)}
      </datalist>
    </div>
  );
}

function LoginScreen({ onLogin }) {
  const [modo, setModo] = useState("login"); // login | registro
  const [usuario, setUsuario] = useState("");
  const [password, setPassword] = useState("");
  const [nombre, setNombre] = useState("");
  const [cargando, setCargando] = useState(false);
  const [msg, setMsg] = useState("");
  const [msgTipo, setMsgTipo] = useState("ok");

  const mostrar = (texto, tipo="ok") => { setMsg(texto); setMsgTipo(tipo); };

  const handleLogin = async () => {
    if (!usuario || !password) { mostrar("Completá usuario y contraseña","err"); return; }
    setCargando(true); setMsg("");
    try {
      const res = await jsonp({ action:"login", usuario, password });
      if (res.ok) {
        onLogin({ usuario, nombre: res.nombre });
      } else {
        mostrar(res.msg || "Datos incorrectos","err");
      }
    } catch(e) { mostrar("Error de conexión","err"); }
    setCargando(false);
  };

  const handleRegistro = async () => {
    if (!usuario || !password || !nombre) { mostrar("Completá todos los campos","err"); return; }
    if (password.length < 4) { mostrar("La contraseña debe tener al menos 4 caracteres","err"); return; }
    setCargando(true); setMsg("");
    try {
      const res = await jsonp({ action:"registro", usuario, password, nombre });
      if (res.ok) {
        mostrar(res.msg,"ok");
        setTimeout(()=>setModo("login"),2500);
      } else {
        mostrar(res.msg || "Error al registrarse","err");
      }
    } catch(e) { mostrar("Error de conexión","err"); }
    setCargando(false);
  };

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#1e3a5f,#2563eb)",display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}}>
      <div style={{background:"#fff",borderRadius:"20px",padding:"32px 28px",width:"100%",maxWidth:"360px",boxShadow:"0 20px 60px rgba(0,0,0,.3)"}}>
        <div style={{textAlign:"center",marginBottom:"28px"}}>
          <div style={{fontSize:"28px",marginBottom:"8px"}}>◆</div>
          <div style={{fontSize:"20px",fontWeight:700,color:"#1e293b"}}>Oportunidades</div>
          <div style={{fontSize:"13px",color:"#94a3b8",marginTop:"4px"}}>{modo==="login"?"Ingresá con tu cuenta":"Solicitá acceso"}</div>
        </div>

        {modo==="registro" && (
          <div style={{marginBottom:"14px"}}>
            <label style={{fontSize:"11px",fontWeight:700,textTransform:"uppercase",letterSpacing:".7px",color:"#94a3b8",display:"block",marginBottom:"6px"}}>Nombre completo</label>
            <input className="fi" value={nombre} onChange={e=>setNombre(e.target.value)} placeholder="Tu nombre"/>
          </div>
        )}
        <div style={{marginBottom:"14px"}}>
          <label style={{fontSize:"11px",fontWeight:700,textTransform:"uppercase",letterSpacing:".7px",color:"#94a3b8",display:"block",marginBottom:"6px"}}>Usuario</label>
          <input className="fi" value={usuario} onChange={e=>setUsuario(e.target.value)} placeholder="tu.usuario" autoCapitalize="none"/>
        </div>
        <div style={{marginBottom:"20px"}}>
          <label style={{fontSize:"11px",fontWeight:700,textTransform:"uppercase",letterSpacing:".7px",color:"#94a3b8",display:"block",marginBottom:"6px"}}>Contraseña</label>
          <input className="fi" type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••"/>
        </div>

        {msg && (
          <div style={{padding:"10px 14px",borderRadius:"8px",fontSize:"13px",fontWeight:500,marginBottom:"16px",
            background:msgTipo==="ok"?"#f0fdf4":"#fee2e2",
            color:msgTipo==="ok"?"#166534":"#991b1b"}}>
            {msg}
          </div>
        )}

        <button className="btn-primary full" disabled={cargando}
          onClick={modo==="login"?handleLogin:handleRegistro}>
          {cargando?"Procesando...":(modo==="login"?"Ingresar":"Solicitar acceso")}
        </button>

        <div style={{textAlign:"center",marginTop:"16px"}}>
          {modo==="login" ? (
            <span style={{fontSize:"13px",color:"#64748b"}}>
              ¿No tenés acceso?{" "}
              <button style={{background:"none",border:"none",color:"#2563eb",fontWeight:600,cursor:"pointer",fontSize:"13px"}}
                onClick={()=>{setModo("registro");setMsg("");}}>Solicitá acceso</button>
            </span>
          ) : (
            <button style={{background:"none",border:"none",color:"#2563eb",fontWeight:600,cursor:"pointer",fontSize:"13px"}}
              onClick={()=>{setModo("login");setMsg("");}}>← Volver al login</button>
          )}
        </div>
      </div>
    </div>
  );
}

    try {
      const res = await jsonp({ action:"listUsers" });
      if (res.ok) setDatos(res);
    } catch(e) {}
    setCargando(false);
  };

  useEffect(()=>{ cargar(); },[]);

  const aprobar = async (usuario) => {
    try {
      await jsonp({ action:"aprobarUser", usuario });
      setMsg("Usuario aprobado ✓");
      cargar();
    } catch(e) { setMsg("Error"); }
  };

  const rechazar = async (usuario) => {
    if (!confirm("¿Rechazar a "+usuario+"?")) return;
    try {
      await jsonp({ action:"rechazarUser", usuario });
      setMsg("Solicitud rechazada");
      cargar();
    } catch(e) { setMsg("Error"); }
  };

  const eliminar = async (usuario) => {
    if (!confirm("¿Eliminar usuario "+usuario+"?")) return;
    try {
      await jsonp({ action:"eliminarUser", usuario });
      setMsg("Usuario eliminado");
      cargar();
    } catch(e) { setMsg("Error"); }
  };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:2000,overflowY:"auto",padding:"20px"}}>
      <div style={{background:"#fff",borderRadius:"16px",maxWidth:"500px",margin:"0 auto",overflow:"hidden"}}>
        <div style={{background:"linear-gradient(135deg,#1e3a5f,#2563eb)",padding:"20px 24px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{color:"#fff",fontWeight:700,fontSize:"17px"}}>👥 Administrar Usuarios</div>
          <button style={{background:"rgba(255,255,255,.2)",border:"none",color:"#fff",borderRadius:"8px",padding:"6px 12px",cursor:"pointer",fontSize:"13px"}}
            onClick={onClose}>✕ Cerrar</button>
        </div>

        {msg && <div style={{padding:"10px 20px",background:"#f0fdf4",color:"#166534",fontSize:"13px",fontWeight:500}}>{msg}</div>}

        <div style={{padding:"20px"}}>
          {cargando ? (
            <div style={{textAlign:"center",padding:"40px",color:"#94a3b8"}}>Cargando...</div>
          ) : (
            <>
              {/* PENDIENTES */}
              <div style={{marginBottom:"24px"}}>
                <div style={{fontSize:"11px",fontWeight:700,textTransform:"uppercase",letterSpacing:".8px",color:"#f59e0b",marginBottom:"12px"}}>
                  ⏳ Solicitudes pendientes ({datos?.pendientes?.length||0})
                </div>
                {datos?.pendientes?.length===0 && <div style={{color:"#94a3b8",fontSize:"13px"}}>Sin solicitudes pendientes</div>}
                {datos?.pendientes?.map(u=>(
                  <div key={u.usuario} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",background:"#fffbeb",borderRadius:"10px",marginBottom:"8px",border:"1px solid #fde68a"}}>
                    <div>
                      <div style={{fontWeight:600,fontSize:"14px"}}>{u.nombre}</div>
                      <div style={{fontSize:"12px",color:"#64748b"}}>{u.usuario} · {u.fecha}</div>
                    </div>
                    <div style={{display:"flex",gap:6}}>
                      <button style={{background:"#22c55e",color:"#fff",border:"none",borderRadius:"7px",padding:"6px 10px",cursor:"pointer",fontSize:"12px",fontWeight:600}}
                        onClick={()=>aprobar(u.usuario)}>✓ Aprobar</button>
                      <button style={{background:"#ef4444",color:"#fff",border:"none",borderRadius:"7px",padding:"6px 10px",cursor:"pointer",fontSize:"12px",fontWeight:600}}
                        onClick={()=>rechazar(u.usuario)}>✕</button>
                    </div>
                  </div>
                ))}
              </div>

              {/* APROBADOS */}
              <div>
                <div style={{fontSize:"11px",fontWeight:700,textTransform:"uppercase",letterSpacing:".8px",color:"#22c55e",marginBottom:"12px"}}>
                  ✅ Usuarios aprobados ({datos?.aprobados?.length||0})
                </div>
                {datos?.aprobados?.map(u=>(
                  <div key={u.usuario} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",background:"#f8fafc",borderRadius:"10px",marginBottom:"8px",border:"1px solid #e2e8f0"}}>
                    <div>
                      <div style={{fontWeight:600,fontSize:"14px"}}>{u.nombre}</div>
                      <div style={{fontSize:"12px",color:"#64748b"}}>{u.usuario}</div>
                    </div>
                    <button style={{background:"#fee2e2",color:"#991b1b",border:"1px solid #fecdd3",borderRadius:"7px",padding:"6px 10px",cursor:"pointer",fontSize:"12px",fontWeight:600}}
                      onClick={()=>eliminar(u.usuario)}>🗑️ Eliminar</button>
                  </div>
                ))}
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

const CAMPOS_EDITABLES = ["Vendedor","Valor USD","RAZON SOCIAL","Producto","Marca","Real state","Observaciones","Estado"];

function App() {
  const [vista, setVista] = useState("lista");
  const [ops, setOps] = useState([]);
  const [cargando, setCargando] = useState(true);
  const [guardando, setGuardando] = useState(false);
  const [busqueda, setBusqueda] = useState("");
  const [filtroEstado, setFiltroEstado] = useState("");
  const [sel, setSel] = useState(null);
  const [form, setForm] = useState({});
  const [edicion, setEdicion] = useState(false);
  const [toast, setToast] = useState(null);
  const [errorMsg, setErrorMsg] = useState("");
  const [editFields, setEditFields] = useState({});
  const [editando, setEditando] = useState(false);
  const [modalGuardar, setModalGuardar] = useState(false);
  const [adminPanel, setAdminPanel] = useState(false);

  const msg = (text, tipo="ok") => { setToast({text,tipo}); setTimeout(()=>setToast(null),3500); };

  const cargar = async () => {
    setCargando(true);
    try { setOps(await jsonp({ action:"list" })); }
    catch(e) { msg("Error al cargar: "+e.message,"err"); }
    setCargando(false);
  };

  useEffect(() => { cargar(); }, []);

  const filtradas = ops.filter(op => {
    const t = busqueda.toLowerCase();
    return (!t || CAMPOS.some(c=>(op[c]||"").toLowerCase().includes(t)))
      && (!filtroEstado || op.Estado===filtroEstado);
  });

  const guardar = async (data) => {
    setGuardando(true); setErrorMsg("");
    try {
      const id = data.id || Date.now().toString();
      const campos = { id };
      CAMPOS.forEach(c => { campos[c] = data[c] || ""; });
      await jsonp({ action: data.id ? "update" : "save", ...campos });
      if (data.id) {
        const upd = { ...data, ...campos };
        setOps(prev => prev.map(o => o.id===data.id ? upd : o));
        if (sel?.id===data.id) setSel(upd);
        msg("Actualizado ✓");
      } else {
        setOps(prev => [...prev, { ...campos }]);
        msg("Guardado en Google Sheets ✓");
      }
      setVista(edicion ? "detalle" : "lista");
      setEdicion(false);
    } catch(e) { setErrorMsg("No se pudo guardar: " + e.message); }
    setGuardando(false);
  };

  const eliminar = async (id) => {
    if (!confirm("\u00bfEliminar esta oportunidad?")) return;
    try {
      await jsonp({ action:"delete", id });
      setOps(prev => prev.filter(o=>o.id!==id));
      msg("Eliminada","warn"); setVista("lista");
    } catch(e) { msg("Error: "+e.message,"err"); }
  };

  const cambiarEstado = async (id, estado) => {
    const op = ops.find(o=>o.id===id); if(!op) return;
    const upd = {...op, Estado:estado};
    const campos = { id }; CAMPOS.forEach(c=>{campos[c]=upd[c]||"";});
    try {
      await jsonp({ action:"update", ...campos });
      setOps(prev=>prev.map(o=>o.id===id?upd:o));
      setSel(upd); msg("Estado → "+estado+" ✓");
    } catch(e) { msg("Error: "+e.message,"err"); }
  };

  const iniciarEdicion = () => {
    const campos = {};
    CAMPOS_EDITABLES.forEach(c => { campos[c] = sel ? (sel[c] || "") : ""; });
    setEditFields(campos);
    setEditando(true);
  };

  const cancelarEdicion = () => { setEditando(false); setEditFields({}); };

  const guardarEdicion = async (comoNueva) => {
    setModalGuardar(false);
    setGuardando(true);
    try {
      if (comoNueva) {
        const nuevo = { ...sel, ...editFields, id: Date.now().toString() };
        const campos = { id: nuevo.id };
        CAMPOS.forEach(c => { campos[c] = nuevo[c] || ""; });
        await jsonp({ action:"save", ...campos });
        setOps(prev => [...prev, nuevo]);
        setSel(nuevo);
        msg("Guardado como nueva oportunidad ✓");
      } else {
        const actualizado = { ...sel, ...editFields };
        const campos = { id: actualizado.id };
        CAMPOS.forEach(c => { campos[c] = actualizado[c] || ""; });
        await jsonp({ action:"update", ...campos });
        setOps(prev => prev.map(o => o.id===sel.id ? actualizado : o));
        setSel(actualizado);
        msg("Oportunidad actualizada ✓");
      }
      setEditando(false); setEditFields({});
    } catch(e) { msg("Error: "+e.message,"err"); }
    setGuardando(false);
  };

  // ── FORMULARIO NUEVA ──────────────────────────────────────────────────────
  if (vista==="nueva" || edicion) return (
    <div className="app">
      <header className="hdr-bar">
        <button className="btn-back" onClick={()=>{setVista(edicion?"detalle":"lista");setEdicion(false);}}>← Volver</button>
        <span className="hdr-title">{edicion?"Editar":"Nueva Oportunidad"}</span>
      </header>
      <div className="form-wrap">
        {CAMPOS.map(c=>(
          <div className="fgroup" key={c}>
            <label className="flabel">{c}</label>
            <CampoSelect campo={c} value={form[c]||""} onChange={v=>setForm(p=>({...p,[c]:v}))}/>
          </div>
        ))}
        {errorMsg && <div className="err-box">{errorMsg}</div>}
        <div className="form-actions">
          <button className="btn-primary full" disabled={guardando}
            onClick={()=>guardar({...form, id:edicion?sel.id:null})}>
            {guardando?"⏳ Guardando...":"💾 Guardar Oportunidad"}
          </button>
        </div>
      </div>
      {toast && <div className={"toast "+toast.tipo}>{toast.text}</div>}
    </div>
  );

  // ── DETALLE ───────────────────────────────────────────────────────────────
  if (vista==="detalle" && sel) {
    const estadoActual = editando ? (editFields.Estado||sel.Estado) : sel.Estado;
    const col = COLORES[estadoActual]||{bg:"#f3f4f6",text:"#374151",dot:"#9ca3af"};
    return (
      <div className="app">
        <header className="hdr-bar">
          <button className="btn-back" onClick={()=>{cancelarEdicion();setVista("lista");}}>← Volver</button>
          <span className="hdr-title">{editando?"Editando":"Detalle"}</span>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            {!editando && <button className="btn-icon" onClick={iniciarEdicion}>✏️ Editar</button>}
            {!editando && <button className="btn-icon" onClick={()=>exportarPDF(sel)}>📄 PDF</button>}
            {!editando && <button className="btn-icon danger" onClick={()=>eliminar(sel.id)}>🗑️</button>}
            {editando && <button className="btn-icon" onClick={cancelarEdicion}>✕ Cancelar</button>}
            {editando && <button className="btn-primary compact" disabled={guardando} onClick={()=>setModalGuardar(true)}>
              {guardando?"...":"💾 Guardar"}
            </button>}
          </div>
        </header>

        <div className="detail-wrap">
          <div className="detail-hero">
            <div className="d-nombre">{sel["Nombre Oportunidad"]||sel["RAZON SOCIAL"]||"Sin nombre"}</div>
            <div className="d-sub">{editando?(editFields["RAZON SOCIAL"]||sel["RAZON SOCIAL"]):sel["RAZON SOCIAL"]}</div>
            <div className="ebadge" style={{background:col.bg,color:col.text}}>
              <span className="edot" style={{background:col.dot}}></span>
              {estadoActual||"Sin estado"}
            </div>
          </div>

          {editando ? (
            <div style={{background:"#fff",borderRadius:"14px",border:"1.5px solid #2563eb",overflow:"visible",marginBottom:"12px"}}>
              <div style={{padding:"10px 16px",background:"#eff6ff",borderBottom:"1px solid #dbeafe"}}>
                <span style={{fontSize:"11px",fontWeight:700,textTransform:"uppercase",letterSpacing:".8px",color:"#2563eb"}}>Campos editables</span>
              </div>
              {CAMPOS_EDITABLES.map(c=>(
                <div key={c} style={{padding:"10px 16px",borderBottom:"1px solid #f1f5f9",position:"relative",zIndex:50}}>
                  <div style={{fontSize:"11px",fontWeight:600,textTransform:"uppercase",letterSpacing:".6px",color:"#94a3b8",marginBottom:"6px"}}>{c}</div>
                  <CampoSelect campo={c} value={editFields[c]||""} onChange={v=>setEditFields(p=>({...p,[c]:v}))}/>
                </div>
              ))}
            </div>
          ) : (
            <div className="estado-box">
              <div className="sec-title">Cambiar Estado</div>
              <div className="estado-btns">
                {OPCIONES.Estado.map(e=>{
                  const c=COLORES[e];
                  return <button key={e} className={"ebtn"+(sel.Estado===e?" active":"")}
                    style={sel.Estado===e?{background:c.bg,color:c.text,borderColor:c.dot}:{}}
                    onClick={()=>cambiarEstado(sel.id,e)}>{e}</button>;
                })}
              </div>
            </div>
          )}

          <div className="detail-grid">
            {CAMPOS.filter(c=>c!=="Estado"&&(sel[c]||(editando&&editFields[c]))).map(c=>(
              <div className="drow" key={c}>
                <span className="dlabel">{c}</span>
                <span className="dval" style={editando&&CAMPOS_EDITABLES.includes(c)?{color:"#2563eb"}:{}}>
                  {editando&&CAMPOS_EDITABLES.includes(c)?(editFields[c]||sel[c]||""):sel[c]}
                </span>
              </div>
            ))}
          </div>
        </div>

        {modalGuardar && (
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}}>
            <div style={{background:"#fff",borderRadius:"16px",padding:"24px",width:"100%",maxWidth:"340px"}}>
              <div style={{fontSize:"17px",fontWeight:700,color:"#1e293b",marginBottom:"6px"}}>¿Cómo querés guardar?</div>
              <div style={{fontSize:"13px",color:"#64748b",marginBottom:"20px"}}>Actualizá la oportunidad existente o creá una nueva con los cambios.</div>
              <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
                <button style={{width:"100%",padding:"13px",background:"#2563eb",color:"#fff",border:"none",borderRadius:"10px",fontFamily:"inherit",fontSize:"14px",fontWeight:600,cursor:"pointer"}}
                  onClick={()=>guardarEdicion(false)}>
                  💾 Actualizar oportunidad original
                </button>
                <button style={{width:"100%",padding:"13px",background:"#f0fdf4",color:"#166534",border:"1.5px solid #bbf7d0",borderRadius:"10px",fontFamily:"inherit",fontSize:"14px",fontWeight:600,cursor:"pointer"}}
                  onClick={()=>guardarEdicion(true)}>
                  ✨ Guardar como nueva oportunidad
                </button>
                <button style={{width:"100%",padding:"10px",background:"#f1f5f9",color:"#475569",border:"1.5px solid #e2e8f0",borderRadius:"10px",fontFamily:"inherit",fontSize:"13px",cursor:"pointer"}}
                  onClick={()=>setModalGuardar(false)}>
                  Cancelar
                </button>
              </div>
            </div>
          </div>
        )}

        {toast && <div className={"toast "+toast.tipo}>{toast.text}</div>}
      </div>
    );
  }

  // ── LISTA ─────────────────────────────────────────────────────────────────
  return (
    <div className="app">
      <header className="hdr-bar main">
        <div className="brand">
          <span className="brand-icon">◆</span>
          <span className="brand-name">Oportunidades</span>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <button className="btn-icon sm" onClick={cargar} title="Actualizar">🔄</button>
          <button className="btn-icon sm" onClick={()=>setAdminPanel(true)} title="Administrar usuarios">👥</button>
          <button className="btn-primary compact" onClick={()=>{setForm({});setVista("nueva");}}>+ Nueva</button>
        </div>
      </header>
      <div className="search-bar">
        <input className="search-in" placeholder="🔍 Buscar por nombre, empresa, producto..."
          value={busqueda} onChange={e=>setBusqueda(e.target.value)}/>
        <select className="filter-sel" value={filtroEstado} onChange={e=>setFiltroEstado(e.target.value)}>
          <option value="">Todos</option>
          {OPCIONES.Estado.map(e=><option key={e} value={e}>{e}</option>)}
        </select>
      </div>
      <div className="chips-row">
        {OPCIONES.Estado.map(e=>{
          const n=ops.filter(o=>o.Estado===e).length;
          const c=COLORES[e];
          return (
            <button key={e} className={"chip"+(filtroEstado===e?" sel":"")}
              style={filtroEstado===e?{background:c.bg,color:c.text,borderColor:c.dot}:{}}
              onClick={()=>setFiltroEstado(filtroEstado===e?"":e)}>
              <span className="chip-dot" style={{background:c.dot}}></span>
              {e} <strong>{n}</strong>
            </button>
          );
        })}
      </div>
      <div style={{display:"flex",gap:8,padding:"0 16px 12px",flexWrap:"wrap"}}>
        <button className="btn-icon" style={{fontSize:"12px",padding:"6px 12px"}}
          onClick={()=>exportarTodoPDF(filtradas,filtroEstado)}>
          📄 PDF ({filtradas.length})
        </button>

      </div>
      {cargando ? (
        <div className="empty">
          <div className="spinner"></div>
          <div style={{marginTop:12}}>Conectando con Google Sheets...</div>
        </div>
      ) : filtradas.length===0 ? (
        <div className="empty">{busqueda||filtroEstado?"Sin resultados.":"No hay oportunidades. ¡Creá la primera!"}</div>
      ) : (
        <div className="list">
          {filtradas.map(op=>{
            const col=COLORES[op.Estado]||{bg:"#f3f4f6",text:"#374151",dot:"#9ca3af"};
            return (
              <div key={op.id} className="card" onClick={()=>{cancelarEdicion();setSel(op);setVista("detalle");}}>
                <div className="card-main">
                  <div className="card-nombre">{op["Nombre Oportunidad"]||op["RAZON SOCIAL"]||"—"}</div>
                  <div className="card-sub">{op["RAZON SOCIAL"]}{op.Provincia?" · "+op.Provincia:""}</div>
                  <div className="tags">
                    {op.Producto&&<span className="tag">{op.Producto}</span>}
                    {op.Marca&&<span className="tag">{op.Marca}</span>}
                    {op.Vendedor&&<span className="tag ghost">{op.Vendedor}</span>}
                  </div>
                </div>
                <div className="card-right">
                  {op["Valor USD"]&&<div className="card-usd">USD {op["Valor USD"]}</div>}
                  <div className="ebadge sm" style={{background:col.bg,color:col.text}}>
                    <span className="edot" style={{background:col.dot}}></span>{op.Estado||"—"}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
      <div className="footer">{ops.length} oportunidad{ops.length!==1?"es":""} &#183; Google Sheets</div>
      {toast && <div className={"toast "+toast.tipo}>{toast.text}</div>}
      {adminPanel && <AdminPanel onClose={()=>setAdminPanel(false)}/>}
    </div>
  );
}

function Root() {
  const [user, setUser] = useState(null);
  if (!user) return <LoginScreen onLogin={setUser}/>;
  return <App currentUser={user}/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
